<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moara</title>

    <!-- Fonte com personalidade: Cinzel para o header (místico/antigo), Nunito para o chat (legível) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        /* ===== VARIÁVEIS DE COR ===== */
        :root {
            --verde-base:    rgb(0, 114, 50);
            --verde-claro:   rgb(181, 255, 214);
            --verde-escuro:  #003d1a;
            --verde-muted:   rgba(0, 114, 50, 0.25);
            --verde-glow:    rgba(0, 200, 90, 0.12);
            --bg-principal:  #080f0a;
            --bg-chat:       #0c150e;
            --bg-bubble-ia:  rgba(0, 60, 25, 0.7);
            --bg-bubble-usr: rgba(0, 114, 50, 0.85);
            --text-principal: #d4ffe8;
            --text-muted:    rgba(181, 255, 214, 0.45);
            --borda:         rgba(0, 114, 50, 0.3);
        }

        /* ===== RESET E BASE ===== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-principal);
            color: var(--text-principal);
            font-family: 'Nunito', sans-serif;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;

            /* textura de fundo sutil */
            background-image:
                radial-gradient(ellipse 80% 60% at 50% -10%, rgba(0,114,50,0.18) 0%, transparent 65%),
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23004d22' fill-opacity='0.06'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }

        /* ===== HEADER ===== */
        header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 18px 24px;
            border-bottom: 1px solid var(--borda);
            background: rgba(8, 15, 10, 0.9);
            backdrop-filter: blur(8px);
            position: relative;
            flex-shrink: 0;
        }

        /* olho/ícone da Moara */
        .header-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 40%, var(--verde-claro), var(--verde-base));
            box-shadow: 0 0 16px rgba(0, 200, 90, 0.5);
            animation: pulsarGlow 3s ease-in-out infinite;
            flex-shrink: 0;
        }

        @keyframes pulsarGlow {
            0%, 100% { box-shadow: 0 0 10px rgba(0, 200, 90, 0.4); }
            50%       { box-shadow: 0 0 28px rgba(0, 200, 90, 0.75); }
        }

        header h1 {
            font-family: 'Cinzel', serif;
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: 0.25em;
            color: var(--verde-claro);
            text-shadow: 0 0 20px rgba(181, 255, 214, 0.4);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00e676;
            box-shadow: 0 0 8px #00e676;
            animation: piscar 2s ease-in-out infinite;
        }

        @keyframes piscar {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.3; }
        }

        /* ===== ÁREA DO CHAT ===== */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            scroll-behavior: smooth;
        }

        /* scrollbar personalizada */
        #chat-container::-webkit-scrollbar { width: 4px; }
        #chat-container::-webkit-scrollbar-track { background: transparent; }
        #chat-container::-webkit-scrollbar-thumb {
            background: var(--verde-base);
            border-radius: 4px;
        }

        /* mensagem genérica */
        .mensagem {
            display: flex;
            max-width: 78%;
            animation: entrarMensagem 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes entrarMensagem {
            from { opacity: 0; transform: translateY(14px) scale(0.96); }
            to   { opacity: 1; transform: translateY(0)   scale(1); }
        }

        /* IA à esquerda */
        .mensagem.ia { align-self: flex-start; }

        /* usuário à direita */
        .mensagem.usuario { align-self: flex-end; flex-direction: row-reverse; }

        /* avatar da IA */
        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, var(--verde-claro), var(--verde-escuro));
            box-shadow: 0 0 10px rgba(0, 200, 90, 0.3);
            flex-shrink: 0;
            margin-right: 8px;
            align-self: flex-end;
        }

        /* balão de fala */
        .balao {
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.6;
            font-size: 0.92rem;
            font-weight: 400;
            word-break: break-word;
        }

        .mensagem.ia .balao {
            background: var(--bg-bubble-ia);
            border: 1px solid var(--borda);
            border-bottom-left-radius: 4px;
            color: var(--verde-claro);
        }

        .mensagem.usuario .balao {
            background: var(--bg-bubble-usr);
            border: 1px solid rgba(181, 255, 214, 0.2);
            border-bottom-right-radius: 4px;
            color: #ffffff;
        }

        /* timestamp */
        .timestamp {
            font-size: 0.68rem;
            color: var(--text-muted);
            margin-top: 4px;
            padding: 0 4px;
            align-self: flex-end;
        }

        .mensagem.ia .timestamp { margin-left: 40px; }

        /* indicador de digitação (três pontinhos) */
        .digitando .balao {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 14px 18px;
        }

        .digitando .balao span {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--verde-claro);
            opacity: 0.5;
            animation: saltar 1.2s ease-in-out infinite;
        }

        .digitando .balao span:nth-child(2) { animation-delay: 0.2s; }
        .digitando .balao span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes saltar {
            0%, 60%, 100% { transform: translateY(0);   opacity: 0.5; }
            30%           { transform: translateY(-6px); opacity: 1; }
        }

        /* mensagem de sistema/erro */
        .msg-sistema {
            align-self: center;
            font-size: 0.78rem;
            color: var(--text-muted);
            font-style: italic;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--borda);
        }

        /* ===== ÁREA DE INPUT ===== */
        footer {
            padding: 14px 16px;
            border-top: 1px solid var(--borda);
            background: rgba(8, 15, 10, 0.95);
            backdrop-filter: blur(10px);
            flex-shrink: 0;
        }

        .input-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            background: rgba(0, 50, 20, 0.5);
            border: 1px solid var(--borda);
            border-radius: 24px;
            padding: 8px 8px 8px 18px;
            transition: border-color 0.25s;
        }

        .input-wrapper:focus-within {
            border-color: var(--verde-base);
            box-shadow: 0 0 0 3px var(--verde-muted);
        }

        #input-user {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-principal);
            font-family: 'Nunito', sans-serif;
            font-size: 0.9rem;
            font-weight: 300;
            resize: none;
            max-height: 120px;
            min-height: 26px;
            line-height: 1.5;

            /* textarea auto-cresce via JS */
            overflow-y: hidden;
        }

        #input-user::placeholder { color: var(--text-muted); }

        #btn-enviar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: var(--verde-base);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
        }

        #btn-enviar:hover {
            background: #00923e;
            box-shadow: 0 0 14px rgba(0, 200, 90, 0.4);
            transform: scale(1.08);
        }

        #btn-enviar:active  { transform: scale(0.95); }
        #btn-enviar:disabled { background: #1a3326; cursor: not-allowed; transform: none; }

        /* ícone de envio (seta) */
        #btn-enviar svg { width: 18px; height: 18px; }

        .hint {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-align: center;
            margin-top: 6px;
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <header>
        <div class="header-icon"></div>
        <h1>MOARA</h1>
        <div class="status-dot"></div>
    </header>

    <!-- CHAT -->
    <div id="chat-container" aria-live="polite" aria-label="Conversa com Moara"></div>

    <!-- INPUT -->
    <footer>
        <div class="input-wrapper">
            <!-- textarea cresce com o conteúdo -->
            <textarea
                id="input-user"
                rows="1"
                placeholder="Escreva para Moara..."
                aria-label="Mensagem para Moara"
            ></textarea>
            <button id="btn-enviar" onclick="enviarMensagem()" aria-label="Enviar mensagem">
                <!-- ícone de seta -->
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                     stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"/>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
            </button>
        </div>
        <p class="hint">Enter para enviar · Shift+Enter para nova linha</p>
    </footer>

</body>

<script>
    /* =========================================================
       REFERÊNCIAS DO DOM
    ========================================================= */
    const chatContainer  = document.getElementById('chat-container');
    const inputUser      = document.getElementById('input-user');
    const btnEnviar      = document.getElementById('btn-enviar');

    /* Histórico e system prompt são gerenciados pelo back-end (MemorySaver + systemprompt.txt) */

    /* =========================================================
       AUTO-RESIZE DO TEXTAREA
    ========================================================= */
    inputUser.addEventListener('input', () => {
        inputUser.style.height = 'auto';
        inputUser.style.height = inputUser.scrollHeight + 'px';
    });

    /* =========================================================
       ATALHO: Enter envia, Shift+Enter quebra linha
    ========================================================= */
    inputUser.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            enviarMensagem();
        }
    });

    /* =========================================================
       HELPERS DE UI
    ========================================================= */

    /** Rola o chat para a última mensagem */
    function rolarParaBaixo() {
        chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
    }

    /** Retorna hora formatada HH:MM */
    function horaAtual() {
        return new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    }

    /**
     * Adiciona uma mensagem de balão no chat.
     * @param {string} texto - Conteúdo da mensagem
     * @param {'ia'|'usuario'} tipo - Quem enviou
     * @returns {HTMLElement} - O elemento .balao (para editar depois, ex: loading)
     */
    function adicionarMensagem(texto, tipo) {
        const wrapper = document.createElement('div');
        wrapper.classList.add('mensagem', tipo);

        // avatar só para a IA
        if (tipo === 'ia') {
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            wrapper.appendChild(avatar);
        }

        const col = document.createElement('div');
        col.style.display = 'flex';
        col.style.flexDirection = 'column';

        const balao = document.createElement('div');
        balao.className = 'balao';
        balao.innerText = texto;

        const ts = document.createElement('span');
        ts.className = 'timestamp';
        ts.innerText = horaAtual();

        col.appendChild(balao);
        col.appendChild(ts);
        wrapper.appendChild(col);

        chatContainer.appendChild(wrapper);
        rolarParaBaixo();
        return balao;
    }

    /**
     * Mostra os pontinhos de "digitando..."
     * @returns {{ el: HTMLElement, remover: Function }}
     */
    function mostrarDigitando() {
        const wrapper = document.createElement('div');
        wrapper.classList.add('mensagem', 'ia', 'digitando');

        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        wrapper.appendChild(avatar);

        const balao = document.createElement('div');
        balao.className = 'balao';
        balao.innerHTML = '<span></span><span></span><span></span>';

        wrapper.appendChild(balao);
        chatContainer.appendChild(wrapper);
        rolarParaBaixo();

        return {
            el: wrapper,
            remover: () => wrapper.remove()
        };
    }

    /** Exibe uma mensagem de sistema (ex: erro, aviso) */
    function adicionarMsgSistema(texto) {
        const el = document.createElement('div');
        el.className = 'msg-sistema';
        el.innerText = texto;
        chatContainer.appendChild(el);
        rolarParaBaixo();
    }

    /* =========================================================
       ENVIO DE MENSAGEM PRINCIPAL
    ========================================================= */
    async function enviarMensagem() {
        const texto = inputUser.value.trim();
        if (!texto) return; // ignora vazio

        /* Bloqueia input enquanto aguarda resposta */
        btnEnviar.disabled = true;
        inputUser.disabled = true;

        /* Mostra a mensagem do usuário */
        adicionarMensagem(texto, 'usuario');

        /* Limpa o campo de input */
        inputUser.value = '';
        inputUser.style.height = 'auto';

        /* Exibe pontinhos enquanto a IA "pensa" */
        const digitando = mostrarDigitando();

        try {
            /* POST /iaTerminal — o back-end cuida do histórico (MemorySaver) e do system prompt */
            const response = await fetch('http://127.0.0.1:8000/iaOutGame', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_prompt: texto })
            });

            if (!response.ok) throw new Error(`HTTP ${response.status}`);

            const data = await response.json();

            /* Remove pontinhos e exibe resposta */
            digitando.remover();
            adicionarMensagem(data.retorno, 'ia');

        } catch (erro) {
            /* Remove pontinhos e mostra erro */
            digitando.remover();
            adicionarMsgSistema('Sem API · ' + erro.message);
        }

        /* Libera o input de volta */
        btnEnviar.disabled = false;
        inputUser.disabled = false;
        inputUser.focus();
    }

    /* =========================================================
       MENSAGEM INICIAL DA MOARA (opcional — simula boas-vindas)
    ========================================================= */
    window.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
            adicionarMensagem('Estou aqui.', 'ia');
        }, 600);
    });
</script>

</html>
